name: igo_safely
description: Women Safety Emergency App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_messaging: ^15.2.10
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.2
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  encrypt: ^5.0.1
  permission_handler: ^11.2.0
  workmanager: ^0.6.0
  flutter_background_service: ^5.0.5
  http: ^1.1.0
  intl: ^0.18.1
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/